<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker TODO App</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        form { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; background: #f9f9f9; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 10px; }
        .completed { text-decoration: line-through; color: #aaa; } /* 👈 完了時の打ち消し線 */
    </style>
</head>
<body>
    <div class="container">
        <h1>My TODO List</h1>
        <form action="/api/todos" method="POST">
            <input type="text" name="title" placeholder="新しいタスクを入力..." required>
            <button type="submit">追加</button>
        </form>
        <ul id="todo-list"></ul>
    </div>

    <script>
        // TODO一覧を取得して描画
        async function fetchTodos() {
            const response = await fetch('/api/todos');
            const todos = await response.json();
            const todoList = document.getElementById('todo-list');
            todoList.innerHTML = '';
            
            todos.forEach(todo => {
                const li = document.createElement('li');
                
                // チェックボックスの作成
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = todo.is_completed;
                
                // テキスト部分の作成
                const span = document.createElement('span');
                span.textContent = todo.title;
                if (todo.is_completed) {
                    span.classList.add('completed');
                }

                // チェックボックスがクリックされた時の処理 👈 【新しく追加】
                checkbox.addEventListener('change', async () => {
                    const updatedStatus = checkbox.checked;
                    
                    // バックエンドの更新APIを叩く
                    await fetch(`/api/todos/${todo.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ is_completed: updatedStatus })
                    });

                    // 見た目を切り替える
                    if (updatedStatus) {
                        span.classList.add('completed');
                    } else {
                        span.classList.remove('completed');
                    }
                });

                li.appendChild(checkbox);
                li.appendChild(span);
                todoList.appendChild(li);
            });
        }
        fetchTodos();
    </script>
</body>
</html>
